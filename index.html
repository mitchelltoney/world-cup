<!DOCTYPE html>
<!--
  ============================================================================
  WORLD CUP 2026 — STARTING XI BOARD (multi-team)
  ============================================================================
  One engine, data-driven. Each team lives in its own file under data/ and
  self-registers into window.TEAMS. The always-visible team bar switches teams
  in place (re-themes via CSS variables) and updates the #hash for deep links.

  TO ADD A TEAM:
    1. Copy data/usa.js -> data/<id>.js, edit the data + theme + flag.
    2. Add <script src="data/<id>.js"></script> below (with the others).
  Nothing else to touch — the bar, pitch, panel and theming are all generic.
  ============================================================================
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Cup 2026 — Starting XI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --night:#0b1530;
    --night-2:#101d40;
    --pitch-a:#2c7a3b;
    --pitch-b:#2f8341;
    --chalk:rgba(255,255,255,.85);
    /* Per-team colours — overwritten by JS on team switch. */
    --primary:#1f3a93;
    --secondary:#c9243f;
    --accent:#f2c14e;
    --ink:#f4f6fb;
    --muted:#9aa6c4;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Barlow',system-ui,sans-serif;
    background:
      radial-gradient(1200px 500px at 50% -10%, #1b2c5e 0%, transparent 60%),
      var(--night);
    color:var(--ink);
    min-height:100vh;
  }
  .wrap{max-width:1060px;margin:0 auto;padding:22px 16px 56px}

  /* ---------- TEAM SWITCHER (always visible) ---------- */
  .team-bar{display:flex;flex-wrap:wrap;align-items:center;gap:9px;margin-bottom:20px}
  .team-bar .bar-label{font-size:11px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;
    color:var(--muted);margin-right:2px}
  .team-pill{display:inline-flex;align-items:center;gap:8px;cursor:pointer;
    background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.13);
    color:var(--ink);font-family:'Barlow',sans-serif;font-weight:700;font-size:13px;
    letter-spacing:.05em;text-transform:uppercase;padding:7px 14px 7px 8px;border-radius:999px;
    transition:background .15s ease,border-color .15s ease,transform .15s ease;
    -webkit-tap-highlight-color:transparent;}
  .team-pill:hover{background:rgba(255,255,255,.10);transform:translateY(-1px)}
  .team-pill:focus-visible{outline:3px solid var(--accent);outline-offset:2px}
  .team-pill .pflag{width:22px;height:14px;border-radius:2px;overflow:hidden;flex:none;
    box-shadow:0 0 0 1px rgba(0,0,0,.3)}
  .team-pill .pflag svg{display:block;width:100%;height:100%}
  .team-pill.active{
    background:color-mix(in srgb, var(--primary) 34%, rgba(255,255,255,.05));
    border-color:color-mix(in srgb, var(--secondary) 70%, transparent);
    box-shadow:0 6px 18px -10px rgba(0,0,0,.7)}

  /* ---------- HEADER ---------- */
  header{margin-bottom:22px}
  .eyebrow{display:inline-flex;align-items:center;gap:8px;
    font-size:12px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--muted)}
  .eyebrow .flag{display:inline-block;width:20px;height:13px;border-radius:2px;overflow:hidden;
    box-shadow:0 0 0 1px rgba(0,0,0,.3)}
  .eyebrow .flag svg{display:block;width:100%;height:100%}
  h1{font-family:'Anton',sans-serif;font-size:clamp(34px,6vw,58px);
    line-height:1.02;letter-spacing:.01em;text-transform:uppercase;margin-top:6px}
  h1 .accent{color:var(--secondary)}
  .sub{color:var(--muted);font-size:14px;margin-top:8px;font-weight:500}
  .sub b{color:var(--ink)}

  .layout{display:grid;grid-template-columns:minmax(300px,440px) 1fr;gap:26px;align-items:start}

  /* ---------- PITCH ---------- */
  .pitch-frame{position:relative;border-radius:14px;padding:10px;
    background:linear-gradient(180deg,#0e1b3e,#0a142e);
    box-shadow:0 30px 60px -30px rgba(0,0,0,.8), inset 0 0 0 1px rgba(255,255,255,.06)}
  .pitch{position:relative;width:100%;aspect-ratio:2/3;border-radius:8px;overflow:hidden;
    background:repeating-linear-gradient(180deg,
      var(--pitch-a) 0, var(--pitch-a) 8.5%,
      var(--pitch-b) 8.5%, var(--pitch-b) 17%);
    box-shadow:inset 0 0 60px rgba(0,0,0,.35)}
  .line{position:absolute;background:var(--chalk)}
  .pitch .border-line{inset:3.5%;border:2px solid var(--chalk);background:none;position:absolute}
  .halfway{left:3.5%;right:3.5%;top:50%;height:2px}
  .center-circle{left:50%;top:50%;width:26%;aspect-ratio:1;border:2px solid var(--chalk);
    border-radius:50%;transform:translate(-50%,-50%);background:none;position:absolute}
  .center-spot{left:50%;top:50%;width:6px;height:6px;border-radius:50%;transform:translate(-50%,-50%)}
  .box-18{left:24%;width:52%;height:16%;border:2px solid var(--chalk);background:none;position:absolute}
  .box-18.bottom{bottom:3.5%;border-bottom:none}
  .box-18.top{top:3.5%;border-top:none}
  .box-6{left:37%;width:26%;height:6.5%;border:2px solid var(--chalk);background:none;position:absolute}
  .box-6.bottom{bottom:3.5%;border-bottom:none}
  .box-6.top{top:3.5%;border-top:none}
  .pen-spot{left:50%;width:6px;height:6px;border-radius:50%}
  .pen-spot.bottom{bottom:14.5%;transform:translateX(-50%)}
  .pen-spot.top{top:14.5%;transform:translateX(-50%)}
  .arc{left:50%;width:18%;aspect-ratio:2/1;border:2px solid var(--chalk);background:none;position:absolute}
  .arc.bottom{bottom:19.5%;transform:translateX(-50%);border-radius:120px 120px 0 0;border-bottom:none}
  .arc.top{top:19.5%;transform:translateX(-50%);border-radius:0 0 120px 120px;border-top:none}

  /* ---------- PLAYER TOKEN ---------- */
  .player{position:absolute;transform:translate(-50%,-50%);
    display:flex;flex-direction:column;align-items:center;gap:2px;
    background:none;border:none;cursor:pointer;padding:0;
    -webkit-tap-highlight-color:transparent;transition:transform .15s ease}
  .player:hover{transform:translate(-50%,-50%) scale(1.07)}
  .player:focus-visible{outline:3px solid var(--accent);outline-offset:3px;border-radius:12px}
  .avatar{position:relative;width:56px;height:56px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #ffffff, #dfe5f2 70%);
    box-shadow:0 6px 14px rgba(0,0,0,.45), inset 0 0 0 2px rgba(255,255,255,.9);
    display:grid;place-items:center;overflow:hidden}
  .player.active .avatar{box-shadow:0 0 0 3px var(--accent), 0 6px 16px rgba(0,0,0,.5)}
  .avatar svg{width:100%;height:100%;display:block}
  .badge{position:absolute;top:-6px;left:-8px;z-index:2;
    font-family:'Anton',sans-serif;font-size:13px;line-height:1;
    background:var(--primary);color:#fff;border:2px solid #fff;
    min-width:24px;padding:4px 4px 3px;text-align:center;border-radius:7px;
    box-shadow:0 3px 6px rgba(0,0,0,.4)}
  .rating{position:absolute;bottom:-6px;right:-10px;z-index:2;
    font-weight:700;font-size:11.5px;line-height:1;
    background:var(--accent);color:#231a05;border:2px solid #fff;
    padding:3px 5px;border-radius:8px;box-shadow:0 3px 6px rgba(0,0,0,.4)}
  .pname{margin-top:5px;font-size:11px;font-weight:700;letter-spacing:.03em;color:#fff;
    background:rgba(7,13,32,.78);padding:2px 7px;border-radius:6px;white-space:nowrap;
    text-shadow:0 1px 2px rgba(0,0,0,.6)}
  .player-wrap{position:relative}

  /* ---------- DETAIL PANEL ---------- */
  .panel{position:relative;border-radius:14px;overflow:hidden;
    background:linear-gradient(165deg,var(--night-2),#0c1734 70%);
    box-shadow:0 30px 60px -30px rgba(0,0,0,.8), inset 0 0 0 1px rgba(255,255,255,.07);
    min-height:380px}
  .panel-stripe{height:5px;background:linear-gradient(90deg,var(--primary) 0 34%,#fff 34% 66%,var(--secondary) 66%)}
  .panel-inner{padding:24px 26px 28px}
  .panel-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;gap:10px;min-height:340px;color:var(--muted)}
  .panel-empty .hint-num{font-family:'Anton',sans-serif;font-size:64px;color:rgba(255,255,255,.08);line-height:1}
  .panel-empty p{max-width:280px;font-size:14px;line-height:1.5}

  .ph-row{display:flex;align-items:center;gap:18px;margin-bottom:6px}
  .ph-avatar{width:84px;height:84px;border-radius:50%;flex:none;
    background:radial-gradient(circle at 35% 30%, #ffffff, #dfe5f2 70%);
    box-shadow:0 8px 18px rgba(0,0,0,.45), inset 0 0 0 2px rgba(255,255,255,.9);overflow:hidden}
  .ph-avatar svg{width:100%;height:100%}
  .ph-kicker{font-size:11px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--secondary)}
  .ph-name{font-family:'Anton',sans-serif;font-size:clamp(26px,3.4vw,36px);text-transform:uppercase;line-height:1.02}
  .ph-name .num{color:var(--muted);font-size:.72em;margin-left:8px}
  .ph-club{color:var(--muted);font-size:13.5px;font-weight:600;margin-top:3px}

  .rating-line{display:flex;align-items:center;gap:14px;margin:16px 0 18px}
  .rating-big{font-family:'Anton',sans-serif;font-size:34px;color:var(--accent);line-height:1}
  .rating-big small{font-size:15px;color:var(--muted);font-family:'Barlow',sans-serif;font-weight:600}
  .rating-bar{flex:1;height:10px;border-radius:6px;background:rgba(255,255,255,.1);overflow:hidden}
  .rating-fill{height:100%;border-radius:6px;
    background:linear-gradient(90deg, color-mix(in srgb, var(--accent) 55%, #000), var(--accent));
    transition:width .45s cubic-bezier(.2,.8,.2,1)}

  .sect{margin-top:16px}
  .sect h3{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;
    color:var(--muted);margin-bottom:6px}
  .sect p{font-size:14.5px;line-height:1.6;color:#dfe5f4}
  .chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:8px}
  .chip{font-size:12.5px;font-weight:600;padding:5px 11px;border-radius:999px;
    background:color-mix(in srgb, var(--primary) 35%, transparent);
    border:1px solid rgba(120,150,230,.35);color:#cdd8f5}

  footer{margin-top:26px;color:var(--muted);font-size:12px;line-height:1.6;max-width:640px}

  /* ---------- BENCH (rotation options, fills the space under the panel) ---------- */
  .side{display:flex;flex-direction:column;gap:18px}
  .bench{border-radius:14px;padding:16px 18px 18px;
    background:linear-gradient(165deg,rgba(16,29,64,.55),rgba(12,23,52,.55));
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.05)}
  .bench-title{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;
    color:var(--muted);margin-bottom:12px}
  .bench-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px}
  .bench-item{display:flex;align-items:center;gap:9px;cursor:pointer;width:100%;text-align:left;
    background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.09);border-radius:10px;
    padding:6px 9px;color:var(--ink);-webkit-tap-highlight-color:transparent;
    transition:background .15s ease,border-color .15s ease,transform .15s ease}
  .bench-item:hover{background:rgba(255,255,255,.09);transform:translateY(-1px)}
  .bench-item:focus-visible{outline:3px solid var(--accent);outline-offset:2px}
  .bench-item.active{background:rgba(255,255,255,.08);
    border-color:color-mix(in srgb,var(--accent) 70%, transparent)}
  .bench-avatar{width:34px;height:34px;border-radius:50%;flex:none;overflow:hidden;
    background:radial-gradient(circle at 35% 30%, #fff, #dfe5f2 70%);
    box-shadow:inset 0 0 0 1.5px rgba(255,255,255,.9)}
  .bench-avatar svg{width:100%;height:100%;display:block}
  .bench-meta{min-width:0;display:flex;flex-direction:column;line-height:1.18}
  .bench-name{font-size:12.5px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .bench-pos{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
  .bench-rating{margin-left:auto;flex:none;font-weight:700;font-size:11px;color:#231a05;
    background:var(--accent);border-radius:6px;padding:2px 6px}

  /* ---------- MOBILE ---------- */
  @media (max-width:760px){
    .layout{grid-template-columns:1fr}
    .panel{position:static;min-height:0}
    .panel-empty{min-height:140px}
    .avatar{width:46px;height:46px}
    .pname{font-size:10px}
    .badge{font-size:11px;min-width:20px;top:-5px;left:-7px}
    .rating{font-size:10px;bottom:-5px;right:-8px}
  }
  @media (prefers-reduced-motion:reduce){
    .player,.rating-fill,.team-pill{transition:none}
  }
</style>
</head>
<body>
<div class="wrap">
  <nav class="team-bar" id="teamBar" aria-label="Select a team"></nav>

  <header>
    <span class="eyebrow"><span class="flag" id="flag" aria-hidden="true"></span><span id="ctx"></span></span>
    <h1 id="headline"></h1>
    <p class="sub" id="sub"></p>
  </header>

  <div class="layout">
    <div class="pitch-frame">
      <!-- Pitch geometry is static; player tokens are injected on team switch. -->
      <div class="pitch" id="pitch" aria-label="Soccer pitch with the starting eleven">
        <div class="border-line"></div>
        <div class="line halfway"></div>
        <div class="center-circle"></div>
        <div class="line center-spot"></div>
        <div class="box-18 bottom"></div>
        <div class="box-6 bottom"></div>
        <div class="line pen-spot bottom"></div>
        <div class="arc bottom"></div>
        <div class="box-18 top"></div>
        <div class="box-6 top"></div>
        <div class="line pen-spot top"></div>
        <div class="arc top"></div>
      </div>
    </div>

    <div class="side">
      <aside class="panel" id="panel" aria-live="polite">
        <div class="panel-stripe"></div>
        <div class="panel-inner panel-empty" id="panelContent"></div>
      </aside>
      <section class="bench" id="bench" aria-label="Bench and rotation options">
        <h3 class="bench-title">Bench · rotation options — tap to scout</h3>
        <div class="bench-grid" id="benchGrid"></div>
      </section>
    </div>
  </div>

  <footer id="footer"></footer>
</div>

<!-- Team data (each file self-registers into window.TEAMS). Add new teams here. -->
<script src="data/usa.js"></script>
<script src="data/france.js"></script>
<script src="data/spain.js"></script>
<script src="data/argentina.js"></script>
<script src="data/england.js"></script>
<script src="data/portugal.js"></script>
<script src="data/brazil.js"></script>
<script src="data/germany.js"></script>
<script src="data/netherlands.js"></script>
<script src="data/norway.js"></script>
<script src="data/croatia.js"></script>
<script src="data/japan.js"></script>

<script>
/* ===========================================================================
   AVATAR — minimal flat head. Identity = skin tone + hair (colour+style) only.
   Kit colours come from the active team (set in applyTeam). No facial features.
   =========================================================================== */
let KIT = {body:"#ffffff", collar:"#1f3a93", v:"#c9243f"};

function avatarSVG(p){
  const s = p.skin, h = p.hair;
  let hairShape = "";
  // Head: ellipse cx=50 cy=50 rx=19 ry=21 → crown ≈ y29, brow ≈ y42
  // ----- HAIR LIBRARY (minimalist; identity = skin + hair colour + style) -----
  // Head: ellipse cx50 cy50 rx19 ry21 → crown ≈ y29, brow ≈ y42, temples x31/x69.
  switch(p.style){
    /* --- short / smooth family --- */
    case "short":     // standard close crop to the brow
      hairShape = `<path d="M31 44 Q31 27 50 27 Q69 27 69 44 L69 46 Q62 38 50 38 Q38 38 31 46 Z" fill="${h}"/>`;
      break;
    case "buzz":      // very short, slightly receding, faded
      hairShape = `<path d="M33 43 Q34 30 50 30 Q66 30 67 43 L67 44 Q60 36 50 36 Q40 36 33 44 Z" fill="${h}" opacity="0.85"/>`;
      break;
    case "crop":      // french crop — fuller, low textured fringe
      hairShape = `<path d="M31 44 Q31 28 50 28 Q69 28 69 44 L65 44 Q62 42 59 43 Q56 42 53 43 Q50 42 47 43 Q44 42 41 43 Q38 42 35 44 Z" fill="${h}"/>`;
      break;
    case "waves":     // tight crop with 360-wave texture
      hairShape = `<path d="M32 43 Q32 28 50 28 Q68 28 68 43 L68 44 L62 44 Q61 37 50 37 Q39 37 38 44 L32 44 Z" fill="${h}"/><path d="M37 34 Q50 32 63 34 M36 39 Q50 37 64 39" stroke="rgba(0,0,0,.2)" stroke-width="1" fill="none" stroke-linecap="round"/>`;
      break;
    case "fade":      // hair on top only, skin/faded sides
      hairShape = `<path d="M35 41 Q36 30 50 30 Q64 30 65 41 Q58 37 50 37 Q42 37 35 41 Z" fill="${h}"/>`;
      break;
    case "taper":     // curly textured top + faded sides
      hairShape = `<path d="M34 42 Q34 33 40 32 Q42 28 47 30 Q50 27 53 30 Q58 28 60 32 Q66 33 66 42 Q58 37 50 37 Q42 37 34 42 Z" fill="${h}"/>`;
      break;
    case "slick":     // slicked back, smooth, high hairline
      hairShape = `<path d="M33 41 Q33 30 50 30 Q67 30 67 41 L67 43 Q60 40 50 40 Q40 40 33 43 Z" fill="${h}"/><path d="M41 33 Q50 31 59 33" stroke="rgba(255,255,255,.16)" stroke-width="1.2" fill="none" stroke-linecap="round"/>`;
      break;
    case "sidepart":  // short with a side parting line
      hairShape = `<path d="M31 44 Q31 27 50 27 Q69 27 69 44 L69 45 Q62 38 50 38 Q38 38 31 45 Z" fill="${h}"/><path d="M58 29 Q56 36 54 43" stroke="rgba(0,0,0,.28)" stroke-width="1.4" fill="none" stroke-linecap="round"/>`;
      break;
    case "quiff":     // volume swept up at the front
      hairShape = `<path d="M34 43 Q33 33 39 31 Q42 24 50 26 Q58 25 59 31 Q66 33 65 43 Q58 38 50 38 Q42 38 34 43 Z" fill="${h}"/>`;
      break;
    case "spiky":     // short spikes on top
      hairShape = `<path d="M33 43 L36 33 L40 41 L43 31 L47 40 L50 30 L53 40 L57 31 L60 41 L64 33 L67 43 Q58 38 50 38 Q42 38 33 43 Z" fill="${h}"/>`;
      break;
    case "receding":  // thinning / receded M-hairline
      hairShape = `<path d="M33 46 Q33 40 38 39 Q40 33 50 33 Q60 33 62 39 Q67 40 67 46 Q64 43 60 42 Q58 38 50 38 Q42 38 40 42 Q36 43 33 46 Z" fill="${h}" opacity="0.92"/>`;
      break;

    /* --- curly / textured family --- */
    case "curls":     // short curly cap
      hairShape = `<path d="M31 45 q-2 -9 5 -12 q-1 -7 7 -7 q2 -5 9 -3 q7 -2 9 4 q7 1 6 8 q5 4 3 10 q-7 -8 -19 -8 q-13 0 -20 8 Z" fill="${h}"/>`;
      break;
    case "coils":     // tight uniform coils
      hairShape = `
        <path d="M32 44 Q32 30 50 30 Q68 30 68 44 Q60 38 50 38 Q40 38 32 44 Z" fill="${h}"/>
        <g fill="${h}"><circle cx="37" cy="33" r="2.7"/><circle cx="43" cy="30.5" r="2.7"/><circle cx="50" cy="30" r="2.8"/><circle cx="57" cy="30.5" r="2.7"/><circle cx="63" cy="33" r="2.7"/><circle cx="34" cy="38" r="2.4"/><circle cx="66" cy="38" r="2.4"/></g>`;
      break;
    case "curlsBig":  // voluminous curly mound (e.g. Cucurella)
      hairShape = `<path d="M27 49 q-4 -14 6 -19 q0 -10 11 -10 q6 -6 13 -2 q12 -2 13 9 q9 4 5 14 q3 6 -3 11 q-9 -10 -22 -10 q-15 0 -23 10 Z" fill="${h}"/>`;
      break;
    case "curlsBlond":// curly cap with a dyed-blond top patch
      hairShape = `
        <path d="M31 45 q-2 -9 5 -12 q-1 -7 7 -7 q2 -5 9 -3 q7 -2 9 4 q7 1 6 8 q5 4 3 10 q-7 -8 -19 -8 q-13 0 -20 8 Z" fill="${h}"/>
        <path d="M36 33 q-1 -7 7 -7 q2 -5 9 -3 q7 -2 9 4 l-2 6 q-6 -5 -12 -5 q-6 0 -9 3 Z" fill="#d9a441"/>`;
      break;
    case "afro":      // large rounded afro
      hairShape = `<path d="M24 48 a26 24 0 1 1 52 0 q-8 -9 -26 -9 q-18 0 -26 9 Z" fill="${h}"/>`;
      break;
    case "hightop":   // flat-top box, faded lower sides
      hairShape = `<path d="M37 42 L37 30 Q37 25 42 25 L58 25 Q63 25 63 30 L63 42 Q57 38 50 38 Q43 38 37 42 Z" fill="${h}"/>`;
      break;

    /* --- twists / locs / braids family --- */
    case "twists":    // short twists / locs
      hairShape = `
        <path d="M32 44 Q33 30 50 30 Q67 30 68 44 L68 45 Q61 37 50 37 Q39 37 32 45 Z" fill="${h}"/>
        <circle cx="37" cy="34" r="4.6" fill="${h}"/><circle cx="45" cy="29.5" r="4.8" fill="${h}"/>
        <circle cx="54" cy="29" r="4.8" fill="${h}"/><circle cx="62" cy="32.5" r="4.6" fill="${h}"/>
        <circle cx="33" cy="40" r="4" fill="${h}"/><circle cx="67" cy="39" r="4" fill="${h}"/>`;
      break;
    case "dreads":    // longer locs hanging down the sides
      hairShape = `
        <path d="M31 43 Q31 28 50 28 Q69 28 69 43 Q60 37 50 37 Q40 37 31 43 Z" fill="${h}"/>
        <g fill="${h}"><path d="M31 40 q-3 13 -1 25 q3 2 5 0 q1 -13 0 -24 Z"/><path d="M37 43 q-3 12 -2 22 q2 2 4 0 q0 -11 0 -22 Z"/><path d="M69 40 q3 13 1 25 q-3 2 -5 0 q-1 -13 0 -24 Z"/><path d="M63 43 q3 12 2 22 q-2 2 -4 0 q0 -11 0 -22 Z"/></g>`;
      break;
    case "cornrows":  // braided lines running front-to-back
      hairShape = `
        <path d="M32 44 Q32 29 50 29 Q68 29 68 44 Q60 39 50 39 Q40 39 32 44 Z" fill="${h}"/>
        <g stroke="rgba(0,0,0,.30)" stroke-width="1.1" fill="none" stroke-linecap="round"><path d="M40 41 Q40 32 44 29.5"/><path d="M46 40 Q46 31 48 29"/><path d="M50 40 L50 29"/><path d="M54 40 Q54 31 52 29"/><path d="M60 41 Q60 32 56 29.5"/></g>`;
      break;

    /* --- long / tied family --- */
    case "long":      // shoulder-length, frames the sides
      hairShape = `<path d="M30 44 Q30 27 50 27 Q70 27 70 44 L70 66 Q67 60 65 56 Q66 46 60 42 Q55 38 50 38 Q45 38 40 42 Q34 46 35 56 Q33 60 30 66 Z" fill="${h}"/>`;
      break;
    case "flow":      // medium, centre-parted
      hairShape = `
        <path d="M30 46 Q29 29 50 28 Q71 29 70 46 L69 53 Q66 47 62 45 Q63 40 57 39 Q53 36 50 38 Q47 36 43 39 Q37 40 38 45 Q34 47 31 53 Z" fill="${h}"/>
        <path d="M50 30 L50 38" stroke="rgba(0,0,0,.20)" stroke-width="1.1" stroke-linecap="round"/>`;
      break;
    case "bun":       // slicked + small top bun
      hairShape = `
        <path d="M31 45 Q31 30 50 30 Q69 30 69 45 L69 46 Q62 40 50 40 Q38 40 31 46 Z" fill="${h}"/>
        <ellipse cx="50" cy="25" rx="6.5" ry="6" fill="${h}"/>`;
      break;
    case "ponytail":  // slicked back + a tail hanging behind
      hairShape = `
        <path d="M32 44 Q32 30 50 30 Q68 30 68 44 L68 45 Q60 40 50 40 Q40 40 32 45 Z" fill="${h}"/>
        <path d="M65 33 q9 7 7 21 q-1 5 -4 5 q-2 -1 -1 -4 q3 -10 -6 -18 Z" fill="${h}"/>`;
      break;
    case "topknot":   // shaved sides + a top knot
      hairShape = `
        <path d="M41 43 Q41 33 50 33 Q59 33 59 43 Q55 39 50 39 Q45 39 41 43 Z" fill="${h}"/>
        <ellipse cx="50" cy="28" rx="5.4" ry="4.8" fill="${h}"/>`;
      break;

    /* --- strips / special --- */
    case "mohawk":    // centre strip, shaved sides
      hairShape = `<path d="M44 44 Q44 25 50 24 Q56 25 56 44 Q53 39 50 39 Q47 39 44 44 Z" fill="${h}"/>`;
      break;
    case "fauxhawk":  // raised centre, faded (not shaved) sides
      hairShape = `<path d="M40 43 Q41 34 46 32 Q47 26 50 26 Q53 26 54 32 Q59 34 60 43 Q55 38 50 38 Q45 38 40 43 Z" fill="${h}"/>`;
      break;
    case "mullet":    // short top + length at the nape
      hairShape = `
        <path d="M32 43 Q32 29 50 29 Q68 29 68 43 Q60 38 50 38 Q40 38 32 43 Z" fill="${h}"/>
        <path d="M34 44 Q31 55 37 63 Q40 59 40 50 Z" fill="${h}"/><path d="M66 44 Q69 55 63 63 Q60 59 60 50 Z" fill="${h}"/>`;
      break;
    case "headband":  // hair + a band across the forehead
      hairShape = `
        <path d="M31 44 Q31 29 50 29 Q69 29 69 44 Q60 39 50 39 Q40 39 31 44 Z" fill="${h}"/>
        <rect x="30.5" y="40.3" width="39" height="3.8" rx="1.4" fill="#222"/><rect x="30.5" y="40.6" width="39" height="0.9" fill="rgba(255,255,255,.18)"/>`;
      break;
    case "bald":      // none
      hairShape = ``;
      break;
  }
  return `
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="${p.name} avatar">
    <path d="M18 100 q5 -26 32 -26 q27 0 32 26 Z" fill="${KIT.body}"/>
    <path d="M18 100 q5 -26 32 -26 q27 0 32 26 l-8 0 q-4 -20 -24 -20 q-20 0 -24 20 Z" fill="${KIT.collar}"/>
    <path d="M44 76 l6 7 l6 -7 Z" fill="${KIT.v}"/>
    <rect x="44" y="62" width="12" height="14" rx="5" fill="${s}"/>
    <ellipse cx="50" cy="50" rx="19" ry="21" fill="${s}"/>
    <circle cx="31.5" cy="52" r="3.6" fill="${s}"/><circle cx="68.5" cy="52" r="3.6" fill="${s}"/>
    ${hairShape}
  </svg>`;
}

/* ===========================================================================
   APP — build the team bar, apply a team (theme + header + pitch + panel).
   =========================================================================== */
const ROOT  = document.documentElement;
const pitch = document.getElementById("pitch");
const panelContent = document.getElementById("panelContent");
let activeTeamId = null, activeBtn = null;

// Build a horizontal gradient of equal colour bars (used for the panel stripe).
function barsGradient(cols){
  const seg = 100 / cols.length;
  const stops = cols.map((c,i)=> `${c} ${(i*seg).toFixed(3)}% ${((i+1)*seg).toFixed(3)}%`);
  return `linear-gradient(90deg, ${stops.join(", ")})`;
}

function buildTeamBar(){
  const bar = document.getElementById("teamBar");
  const label = document.createElement("span");
  label.className = "bar-label"; label.textContent = "World Cup 2026";
  bar.appendChild(label);
  Object.values(window.TEAMS).forEach(t=>{
    const b = document.createElement("button");
    b.className = "team-pill"; b.dataset.team = t.id; b.type = "button";
    b.innerHTML = `<span class="pflag">${t.flag}</span><span>${t.name}</span>`;
    b.addEventListener("click", ()=>{ if(location.hash !== "#"+t.id) location.hash = t.id; applyTeam(t.id); });
    bar.appendChild(b);
  });
}

function applyTeam(id){
  const t = window.TEAMS[id];
  if(!t || id === activeTeamId) return;   // unknown team, or already showing it
  activeTeamId = id;

  // 1) theme
  ROOT.style.setProperty("--primary",   t.theme.primary);
  ROOT.style.setProperty("--secondary", t.theme.secondary);
  ROOT.style.setProperty("--accent",    t.theme.accent);
  KIT = {body:t.theme.kitBody, collar:t.theme.kitCollar, v:t.theme.kitV};
  // Panel stripe = the team's flag colours as bars (each flag in its own order).
  document.querySelector(".panel-stripe").style.background =
    (t.stripe && t.stripe.length) ? barsGradient(t.stripe)
    : "linear-gradient(90deg, var(--primary) 0 34%, #fff 34% 66%, var(--secondary) 66%)";

  // 2) header
  document.getElementById("flag").innerHTML = t.flag;
  document.getElementById("ctx").textContent = t.context;
  document.getElementById("headline").innerHTML = `${t.name} <span class="accent">${t.headlineAccent}</span>`;
  document.getElementById("sub").innerHTML =
    `${t.manager}'s <b>${t.formation}</b> first-choice XI · chip = current EA FC 26 overall · tap a player for the 0–10 scouting card`;
  document.getElementById("footer").textContent = t.footer;
  document.title = `${t.name} Starting XI — World Cup 2026`;

  // 3) active pill
  document.querySelectorAll(".team-pill").forEach(b=>{
    const on = b.dataset.team === id;
    b.classList.toggle("active", on);
    b.setAttribute("aria-pressed", on ? "true" : "false");
  });

  // 4) pitch + bench + empty panel
  renderPitch(t);
  renderBench(t);
  resetPanel(t);
}

function renderPitch(t){
  pitch.querySelectorAll(".player").forEach(n=> n.remove());  // keep markings
  activeBtn = null;
  t.players.forEach(p=>{
    const btn = document.createElement("button");
    btn.className = "player"; btn.type = "button";
    btn.style.left = p.x + "%"; btn.style.top = p.y + "%";
    btn.setAttribute("aria-label", `${p.full}, number ${p.num}, ${p.pos}, EA FC overall ${p.fifa}, scouting rating ${p.rating} out of 10`);
    btn.innerHTML = `
      <span class="player-wrap">
        <span class="badge">${p.num}</span>
        <span class="avatar">${avatarSVG(p)}</span>
        <span class="rating">${p.fifa}</span>
      </span>
      <span class="pname">${p.name}</span>`;
    btn.addEventListener("click", ()=> select(p, btn));
    pitch.appendChild(btn);
  });
}

// Short position label for the compact bench chips.
function shortPos(pos){
  const map = {"Goalkeeper":"GK","Right Back":"RB","Left Back":"LB","Centre Back":"CB",
    "Defensive Midfield":"DM","Central Midfield":"CM","Attacking Midfield":"AM",
    "Right Attacking Mid":"RW","Right Wing":"RW","Left Wing":"LW","Winger":"Wing",
    "Striker":"ST","Forward":"FW"};
  return map[(pos||"").split(" · ")[0]] || pos;
}

// Bench / rotation options — rendered under the panel, click opens the same card.
function renderBench(t){
  const bench = document.getElementById("bench");
  const grid = document.getElementById("benchGrid");
  grid.innerHTML = "";
  const list = t.depth || [];
  bench.style.display = list.length ? "" : "none";
  list.forEach(p=>{
    const btn = document.createElement("button");
    btn.className = "bench-item"; btn.type = "button";
    btn.setAttribute("aria-label", `${p.full}, ${p.pos}, EA FC overall ${p.fifa}, scouting rating ${p.rating} out of 10, bench option`);
    btn.innerHTML = `
      <span class="bench-avatar">${avatarSVG(p)}</span>
      <span class="bench-meta">
        <span class="bench-name">${p.name}</span>
        <span class="bench-pos">${shortPos(p.pos)}</span>
      </span>
      <span class="bench-rating">${p.fifa}</span>`;
    btn.addEventListener("click", ()=> select(p, btn));
    grid.appendChild(btn);
  });
}

function resetPanel(t){
  panelContent.className = "panel-inner panel-empty";
  panelContent.innerHTML =
    `<div class="hint-num">${t.hintCorner}</div>
     <p>Select any player on the pitch to see what kind of player he is, what he's known for, and where he hurts opponents.</p>`;
}

function select(p, btn){
  if(activeBtn) activeBtn.classList.remove("active");
  btn.classList.add("active");
  activeBtn = btn;
  panelContent.className = "panel-inner";
  panelContent.innerHTML = `
    <div class="ph-row">
      <div class="ph-avatar">${avatarSVG(p)}</div>
      <div>
        <div class="ph-kicker">${p.pos}</div>
        <div class="ph-name">${p.full}<span class="num">#${p.num}</span></div>
        <div class="ph-club">${p.club}</div>
      </div>
    </div>
    <div class="rating-line">
      <div class="rating-big">${p.rating.toFixed(1)}<small> / 10</small></div>
      <div class="rating-bar"><div class="rating-fill" style="width:0%"></div></div>
    </div>
    <div class="sect"><h3>What kind of player</h3><p>${p.type}</p></div>
    <div class="sect"><h3>Known for</h3><p>${p.known}</p></div>
    <div class="sect"><h3>Strengths</h3>
      <div class="chips">${p.strengths.map(s=>`<span class="chip">${s}</span>`).join("")}</div>
    </div>`;
  requestAnimationFrame(()=>{ requestAnimationFrame(()=>{
    const fill = panelContent.querySelector(".rating-fill");
    if(fill) fill.style.width = (p.rating*10) + "%";
  });});
  if(window.matchMedia("(max-width:760px)").matches){
    document.getElementById("panel").scrollIntoView({behavior:"smooth", block:"nearest"});
  }
}

/* ---- boot ---- */
const TEAM_IDS = Object.keys(window.TEAMS || {});
if(TEAM_IDS.length === 0){
  document.getElementById("headline").textContent = "No team data loaded";
} else {
  buildTeamBar();
  const fromHash = (location.hash || "").replace("#","");
  applyTeam(window.TEAMS[fromHash] ? fromHash : TEAM_IDS[0]);
  window.addEventListener("hashchange", ()=>{
    const h = (location.hash || "").replace("#","");
    if(window.TEAMS[h]) applyTeam(h);
  });
}
</script>
