<!DOCTYPE html>
<!--
  ============================================================================
  LINEUP PITCH CARD — reusable template
  ============================================================================
  HOW TO USE (see SKILL.md for the full spec):
    1. Edit the TEAM object and the PLAYERS array near the bottom of <script>.
    2. Re-skin: change the CSS variables in :root, the kit colors in
       avatarSVG() (search "KIT COLORS"), and the .flag gradient.
    3. Render at desktop AND ~390px mobile; check labels don't overlap.
    4. Ship this single file.

  This template is team-agnostic: variables are named --primary / --secondary /
  --accent (the rating color). The sample data below is a generic XI you should
  replace. Pitch geometry, avatar paths, panel behavior, responsiveness and
  accessibility are already correct — don't rebuild them.
  ============================================================================
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Starting XI — Lineup Card</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    /* ---- THEME: edit these to re-skin ---- */
    --night:#0b1530;        /* page background base                */
    --night-2:#101d40;      /* panel background top                */
    --pitch-a:#2c7a3b;      /* pitch mow-stripe A                  */
    --pitch-b:#2f8341;      /* pitch mow-stripe B                  */
    --chalk:rgba(255,255,255,.85); /* pitch markings               */
    --secondary:#c9243f;    /* accent word, panel eyebrow, stripe  */
    --primary:#1f3a93;      /* number badge, stripe, chip bg       */
    --accent:#f2c14e;       /* RATING color: chips, bar, ring      */
    --ink:#f4f6fb;          /* default text                        */
    --muted:#9aa6c4;        /* secondary text / labels             */
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Barlow',system-ui,sans-serif;
    background:
      radial-gradient(1200px 500px at 50% -10%, #1b2c5e 0%, transparent 60%),
      var(--night);
    color:var(--ink);
    min-height:100vh;
  }
  .wrap{max-width:1060px;margin:0 auto;padding:28px 16px 56px}

  /* ---------- HEADER ---------- */
  header{margin-bottom:22px}
  .eyebrow{
    display:inline-flex;align-items:center;gap:8px;
    font-size:12px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);
  }
  /* Flag chip: abstract CSS gradient. Replace gradient for your nation/club.
     Simple vertical tricolor example is in SKILL.md §3.4. */
  .eyebrow .flag{display:inline-block;width:20px;height:13px;border-radius:2px;overflow:hidden;
    background:linear-gradient(180deg,#c9243f 0,#c9243f 20%,#fff 20%,#fff 40%,#c9243f 40%,#c9243f 60%,#fff 60%,#fff 80%,#c9243f 80%);
    position:relative}
  .eyebrow .flag::after{content:"";position:absolute;left:0;top:0;width:45%;height:55%;background:#1f3a93}
  h1{
    font-family:'Anton',sans-serif;font-size:clamp(34px,6vw,58px);
    line-height:1.02;letter-spacing:.01em;text-transform:uppercase;margin-top:6px;
  }
  h1 .accent{color:var(--secondary)}
  .sub{color:var(--muted);font-size:14px;margin-top:8px;font-weight:500}
  .sub b{color:var(--ink)}

  .layout{display:grid;grid-template-columns:minmax(300px,440px) 1fr;gap:26px;align-items:start}

  /* ---------- PITCH ---------- */
  .pitch-frame{position:relative;border-radius:14px;padding:10px;
    background:linear-gradient(180deg,#0e1b3e,#0a142e);
    box-shadow:0 30px 60px -30px rgba(0,0,0,.8), inset 0 0 0 1px rgba(255,255,255,.06)}
  .pitch{
    position:relative;width:100%;aspect-ratio:2/3;border-radius:8px;overflow:hidden;
    background:repeating-linear-gradient(180deg,
      var(--pitch-a) 0, var(--pitch-a) 8.5%,
      var(--pitch-b) 8.5%, var(--pitch-b) 17%);
    box-shadow:inset 0 0 60px rgba(0,0,0,.35);
  }
  .line{position:absolute;background:var(--chalk)}
  .pitch .border-line{inset:3.5%;border:2px solid var(--chalk);background:none;position:absolute}
  .halfway{left:3.5%;right:3.5%;top:50%;height:2px}
  .center-circle{left:50%;top:50%;width:26%;aspect-ratio:1;border:2px solid var(--chalk);
    border-radius:50%;transform:translate(-50%,-50%);background:none;position:absolute}
  .center-spot{left:50%;top:50%;width:6px;height:6px;border-radius:50%;transform:translate(-50%,-50%)}
  .box-18{left:24%;width:52%;height:16%;border:2px solid var(--chalk);background:none;position:absolute}
  .box-18.bottom{bottom:3.5%;border-bottom:none}
  .box-18.top{top:3.5%;border-top:none}
  .box-6{left:37%;width:26%;height:6.5%;border:2px solid var(--chalk);background:none;position:absolute}
  .box-6.bottom{bottom:3.5%;border-bottom:none}
  .box-6.top{top:3.5%;border-top:none}
  .pen-spot{left:50%;width:6px;height:6px;border-radius:50%}
  .pen-spot.bottom{bottom:14.5%;transform:translateX(-50%)}
  .pen-spot.top{top:14.5%;transform:translateX(-50%)}
  .arc{left:50%;width:18%;aspect-ratio:2/1;border:2px solid var(--chalk);background:none;position:absolute}
  .arc.bottom{bottom:19.5%;transform:translateX(-50%);border-radius:120px 120px 0 0;border-bottom:none}
  .arc.top{top:19.5%;transform:translateX(-50%);border-radius:0 0 120px 120px;border-top:none}

  /* ---------- PLAYER TOKEN ---------- */
  .player{
    position:absolute;transform:translate(-50%,-50%);
    display:flex;flex-direction:column;align-items:center;gap:2px;
    background:none;border:none;cursor:pointer;padding:0;
    -webkit-tap-highlight-color:transparent;
    transition:transform .15s ease;
  }
  .player:hover{transform:translate(-50%,-50%) scale(1.07)}
  .player:focus-visible{outline:3px solid var(--accent);outline-offset:3px;border-radius:12px}
  .avatar{
    position:relative;width:56px;height:56px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #ffffff, #dfe5f2 70%);
    box-shadow:0 6px 14px rgba(0,0,0,.45), inset 0 0 0 2px rgba(255,255,255,.9);
    display:grid;place-items:center;overflow:hidden;
  }
  .player.active .avatar{box-shadow:0 0 0 3px var(--accent), 0 6px 16px rgba(0,0,0,.5)}
  .avatar svg{width:100%;height:100%;display:block}
  .badge{
    position:absolute;top:-6px;left:-8px;z-index:2;
    font-family:'Anton',sans-serif;font-size:13px;line-height:1;
    background:var(--primary);color:#fff;border:2px solid #fff;
    min-width:24px;padding:4px 4px 3px;text-align:center;border-radius:7px;
    box-shadow:0 3px 6px rgba(0,0,0,.4);
  }
  .rating{
    position:absolute;bottom:-6px;right:-10px;z-index:2;
    font-weight:700;font-size:11.5px;line-height:1;
    background:var(--accent);color:#231a05;border:2px solid #fff;
    padding:3px 5px;border-radius:8px;box-shadow:0 3px 6px rgba(0,0,0,.4);
  }
  .pname{
    margin-top:5px;font-size:11px;font-weight:700;letter-spacing:.03em;color:#fff;
    background:rgba(7,13,32,.78);padding:2px 7px;border-radius:6px;white-space:nowrap;
    text-shadow:0 1px 2px rgba(0,0,0,.6);
  }
  .player-wrap{position:relative}

  /* ---------- DETAIL PANEL ---------- */
  .panel{
    position:sticky;top:18px;border-radius:14px;overflow:hidden;
    background:linear-gradient(165deg,var(--night-2),#0c1734 70%);
    box-shadow:0 30px 60px -30px rgba(0,0,0,.8), inset 0 0 0 1px rgba(255,255,255,.07);
    min-height:380px;
  }
  .panel-stripe{height:5px;background:linear-gradient(90deg,var(--primary) 0 34%,#fff 34% 66%,var(--secondary) 66%)}
  .panel-inner{padding:24px 26px 28px}
  .panel-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;gap:10px;min-height:340px;color:var(--muted)}
  .panel-empty .hint-num{font-family:'Anton',sans-serif;font-size:64px;color:rgba(255,255,255,.08);line-height:1}
  .panel-empty p{max-width:280px;font-size:14px;line-height:1.5}

  .ph-row{display:flex;align-items:center;gap:18px;margin-bottom:6px}
  .ph-avatar{width:84px;height:84px;border-radius:50%;flex:none;
    background:radial-gradient(circle at 35% 30%, #ffffff, #dfe5f2 70%);
    box-shadow:0 8px 18px rgba(0,0,0,.45), inset 0 0 0 2px rgba(255,255,255,.9);overflow:hidden}
  .ph-avatar svg{width:100%;height:100%}
  .ph-kicker{font-size:11px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--secondary)}
  .ph-name{font-family:'Anton',sans-serif;font-size:clamp(26px,3.4vw,36px);text-transform:uppercase;line-height:1.02}
  .ph-name .num{color:var(--muted);font-size:.72em;margin-left:8px}
  .ph-club{color:var(--muted);font-size:13.5px;font-weight:600;margin-top:3px}

  .rating-line{display:flex;align-items:center;gap:14px;margin:16px 0 18px}
  .rating-big{font-family:'Anton',sans-serif;font-size:34px;color:var(--accent);line-height:1}
  .rating-big small{font-size:15px;color:var(--muted);font-family:'Barlow',sans-serif;font-weight:600}
  .rating-bar{flex:1;height:10px;border-radius:6px;background:rgba(255,255,255,.1);overflow:hidden}
  .rating-fill{height:100%;border-radius:6px;background:linear-gradient(90deg,#b88a1f,var(--accent));
    transition:width .45s cubic-bezier(.2,.8,.2,1)}

  .sect{margin-top:16px}
  .sect h3{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;
    color:var(--muted);margin-bottom:6px}
  .sect p{font-size:14.5px;line-height:1.6;color:#dfe5f4}
  .chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:8px}
  .chip{font-size:12.5px;font-weight:600;padding:5px 11px;border-radius:999px;
    background:color-mix(in srgb, var(--primary) 35%, transparent);
    border:1px solid rgba(120,150,230,.35);color:#cdd8f5}

  footer{margin-top:26px;color:var(--muted);font-size:12px;line-height:1.6;max-width:640px}

  /* ---------- MOBILE ---------- */
  @media (max-width:760px){
    .layout{grid-template-columns:1fr}
    .panel{position:static;min-height:0}
    .panel-empty{min-height:140px}
    .avatar{width:46px;height:46px}
    .pname{font-size:10px}
    .badge{font-size:11px;min-width:20px;top:-5px;left:-7px}
    .rating{font-size:10px;bottom:-5px;right:-8px}
  }
  @media (prefers-reduced-motion:reduce){
    .player,.rating-fill{transition:none}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <span class="eyebrow"><span class="flag" aria-hidden="true"></span><span id="ctx"></span></span>
    <h1 id="headline"></h1>
    <p class="sub" id="sub"></p>
  </header>

  <div class="layout">
    <div class="pitch-frame">
      <!-- Pitch geometry: copy verbatim, do not rebuild. Team attacks UP. -->
      <div class="pitch" id="pitch" aria-label="Soccer pitch with starting eleven">
        <div class="border-line"></div>
        <div class="line halfway"></div>
        <div class="center-circle"></div>
        <div class="line center-spot"></div>
        <div class="box-18 bottom"></div>
        <div class="box-6 bottom"></div>
        <div class="line pen-spot bottom"></div>
        <div class="arc bottom"></div>
        <div class="box-18 top"></div>
        <div class="box-6 top"></div>
        <div class="line pen-spot top"></div>
        <div class="arc top"></div>
      </div>
    </div>

    <aside class="panel" id="panel" aria-live="polite">
      <div class="panel-stripe"></div>
      <div class="panel-inner panel-empty" id="panelContent">
        <div class="hint-num" id="hintCorner">XI</div>
        <p>Select any player on the pitch to see what kind of player they are, what they're known for, and where they hurt opponents.</p>
      </div>
    </aside>
  </div>

  <footer id="footer"></footer>
</div>

<script>
/* ===========================================================================
   AVATAR — minimal flat head. Identity = skin tone + hair (color+style) only.
   No facial features (keeps everyone uniform; avoids likeness). See SKILL.md §6.
   =========================================================================== */
function avatarSVG(p){
  const s = p.skin, h = p.hair;
  let hairShape = "";
  // Head ellipse: cx=50 cy=50 rx=19 ry=21  →  crown ≈ y27-30, brow ≈ y42
  switch(p.style){
    case "short":      // close-cropped cap to the brow
      hairShape = `<path d="M31 44 Q31 27 50 27 Q69 27 69 44 L69 46 Q62 38 50 38 Q38 38 31 46 Z" fill="${h}"/>`;
      break;
    case "buzz":       // very short, receding at the temples
      hairShape = `<path d="M34 42 Q35 29 50 29 Q65 29 66 42 L66 43 Q60 35 50 35 Q40 35 34 43 Z" fill="${h}" opacity="0.9"/>`;
      break;
    case "curls":      // bumpy curly cap
      hairShape = `<path d="M31 45 q-2 -9 5 -12 q-1 -7 7 -7 q2 -5 9 -3 q7 -2 9 4 q7 1 6 8 q5 4 3 10 q-7 -8 -19 -8 q-13 0 -20 8 Z" fill="${h}"/>`;
      break;
    case "curlsBlond": // curly cap with a dyed-blond top patch
      hairShape = `
        <path d="M31 45 q-2 -9 5 -12 q-1 -7 7 -7 q2 -5 9 -3 q7 -2 9 4 q7 1 6 8 q5 4 3 10 q-7 -8 -19 -8 q-13 0 -20 8 Z" fill="${h}"/>
        <path d="M36 33 q-1 -7 7 -7 q2 -5 9 -3 q7 -2 9 4 l-2 6 q-6 -5 -12 -5 q-6 0 -9 3 Z" fill="#d9a441"/>`;
      break;
    case "twists":     // low cap + scattered "twists/locs"
      hairShape = `
        <path d="M32 44 Q33 30 50 30 Q67 30 68 44 L68 45 Q61 37 50 37 Q39 37 32 45 Z" fill="${h}"/>
        <circle cx="37" cy="34" r="4.6" fill="${h}"/><circle cx="45" cy="29.5" r="4.8" fill="${h}"/>
        <circle cx="54" cy="29" r="4.8" fill="${h}"/><circle cx="62" cy="32.5" r="4.6" fill="${h}"/>
        <circle cx="33" cy="40" r="4" fill="${h}"/><circle cx="67" cy="39" r="4" fill="${h}"/>`;
      break;
    case "waves":      // tight crop with a crisp straight hairline
      hairShape = `<path d="M32 43 Q32 28 50 28 Q68 28 68 43 L68 44 L62 44 Q61 37 50 37 Q39 37 38 44 L32 44 Z" fill="${h}"/>`;
      break;

    /* ---- extra styles (add your own here) ---- */
    case "bald":       // no hair
      hairShape = ``;
      break;
    case "afro":       // large rounded shape past the skull width
      hairShape = `<path d="M24 48 a26 24 0 1 1 52 0 q-8 -9 -26 -9 q-18 0 -26 9 Z" fill="${h}"/>`;
      break;
    case "mohawk":     // narrow vertical strip down the center
      hairShape = `<path d="M44 44 Q44 25 50 24 Q56 25 56 44 Q53 39 50 39 Q47 39 44 44 Z" fill="${h}"/>`;
      break;
    case "long":       // hair framing the sides past the jaw
      hairShape = `<path d="M30 44 Q30 27 50 27 Q70 27 70 44 L70 66 Q67 60 65 56 Q66 46 60 42 Q55 38 50 38 Q45 38 40 42 Q34 46 35 56 Q33 60 30 66 Z" fill="${h}"/>`;
      break;
  }
  return `
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="${p.name} avatar">
    <!-- KIT COLORS: same for everyone. Body / collar / neck-V.
         Re-skin these three fills to the team kit. -->
    <path d="M18 100 q5 -26 32 -26 q27 0 32 26 Z" fill="#ffffff"/>
    <path d="M18 100 q5 -26 32 -26 q27 0 32 26 l-8 0 q-4 -20 -24 -20 q-20 0 -24 20 Z" fill="#1f3a93"/>
    <path d="M44 76 l6 7 l6 -7 Z" fill="#c9243f"/>
    <!-- neck -->
    <rect x="44" y="62" width="12" height="14" rx="5" fill="${s}"/>
    <!-- head -->
    <ellipse cx="50" cy="50" rx="19" ry="21" fill="${s}"/>
    <!-- ears -->
    <circle cx="31.5" cy="52" r="3.6" fill="${s}"/><circle cx="68.5" cy="52" r="3.6" fill="${s}"/>
    ${hairShape}
  </svg>`;
}

/* ===========================================================================
   TEAM — header strings. Edit these.
   =========================================================================== */
const TEAM = {
  name: "Team Name",
  headlineAccent: "Starting XI",
  context: "Competition · Stage · vs Opponent",
  formation: "4-2-3-1",
  ratingNote: "gold chip = quality rating out of 10",
  footer: "Lineup and ratings are illustrative. Ratings are an editorial blend " +
          "of level, form, and standing — argue accordingly.",
  hintCorner: "XI"
};

/* ===========================================================================
   PLAYERS — one object per starter. Replace entirely. All fields required.
   Coordinates: team attacks UP. GK y≈90 (bottom), striker y≈19 (top).
   x=50 is the spine; x<50 left, x>50 right. See SKILL.md §4 for formation presets.
   Sample below is a generic 4-2-3-1 placeholder.
   =========================================================================== */
const PLAYERS = [
  {id:"gk",  name:"Keeper",  full:"Sample Keeper",  num:1,  pos:"Goalkeeper",            club:"Club", rating:7.0,
   x:50, y:90, skin:"#e9b98e", hair:"#5b3a24", style:"short",
   type:"Describe the goalkeeper's style — shot-stopper vs sweeper-keeper, distribution, command of the box.",
   known:"What they're known for: clubs, trophies, signature moments.",
   strengths:["Reflexes","Distribution","Command","Composure"]},

  {id:"rb",  name:"Right B", full:"Sample Right Back", num:2, pos:"Right Back",           club:"Club", rating:7.2,
   x:82, y:71, skin:"#6f4428", hair:"#171008", style:"waves",
   type:"Fullback style — overlapping vs inverted, defensive solidity, attacking output.",
   known:"Career highlights.",
   strengths:["Recovery pace","Overlaps","Crossing","Stamina"]},

  {id:"rcb", name:"R-CB",    full:"Sample Centre Back", num:4, pos:"Centre Back",         club:"Club", rating:7.6,
   x:65, y:76, skin:"#7a4a2b", hair:"#15100c", style:"twists",
   type:"Centre-back profile — aerial dominance, ball-playing, aggression.",
   known:"Career highlights.",
   strengths:["Aerial duels","Ball progression","Reading the game","Strength"]},

  {id:"lcb", name:"L-CB (C)",full:"Sample Captain",    num:5, pos:"Centre Back · Captain",club:"Club", rating:7.3,
   x:35, y:76, skin:"#ecc096", hair:"#7a5a3c", style:"buzz",
   type:"Organizer at the back — positioning, leadership, left-footed passing.",
   known:"Captaincy and longevity.",
   strengths:["Leadership","Positioning","Left foot","Composure"]},

  {id:"lb",  name:"Left B",  full:"Sample Left Back",  num:3, pos:"Left Back",            club:"Club", rating:7.8,
   x:18, y:71, skin:"#8a5a35", hair:"#15100c", style:"curls",
   type:"Attacking fullback — vertical pace, end product, 1v1 defending.",
   known:"Career highlights.",
   strengths:["Speed","Assists","1v1 defending","Engine"]},

  {id:"dm",  name:"Anchor",  full:"Sample Defensive Mid", num:6, pos:"Defensive Midfield",club:"Club", rating:7.7,
   x:38, y:57, skin:"#9c6b40", hair:"#1a120a", style:"curls",
   type:"The screen in front of the defense — ball-winning, tempo, pressing triggers.",
   known:"Career highlights.",
   strengths:["Tackling","Pressing","Coverage","Discipline"]},

  {id:"cm",  name:"Box-2-Box",full:"Sample Central Mid", num:8, pos:"Central Midfield",   club:"Club", rating:7.9,
   x:63, y:55, skin:"#6f4428", hair:"#171008", style:"curlsBlond",
   type:"Box-to-box engine — late runs, aerial threat, versatility.",
   known:"Career highlights.",
   strengths:["Late runs","Aerial threat","Versatility","Motor"]},

  {id:"ram", name:"R-Wide",  full:"Sample Right Mid",  num:7, pos:"Right Attacking Mid",  club:"Club", rating:7.5,
   x:81, y:37, skin:"#a06a3e", hair:"#171008", style:"curls",
   type:"Wide creator — dribbling, two-footed, final-third threat.",
   known:"Career highlights.",
   strengths:["Dribbling","Press resistance","Creativity","Two-footed"]},

  {id:"cam", name:"Number 10",full:"Sample Playmaker", num:10,pos:"Attacking Midfield",   club:"Club", rating:8.2,
   x:50, y:39, skin:"#8a5a35", hair:"#15100c", style:"curls",
   type:"The creative hub — receives between the lines, ball-striking, goal threat.",
   known:"Career highlights.",
   strengths:["Between lines","Ball-striking","Goal threat","Vision"]},

  {id:"lw",  name:"L-Wing",  full:"Sample Winger",     num:11,pos:"Left Wing",            club:"Club", rating:8.6,
   x:19, y:35, skin:"#ecc096", hair:"#6b4a2e", style:"short",
   type:"The star wide forward — explosive, cuts inside to finish, decisive in big moments.",
   known:"Career highlights and signature moments.",
   strengths:["First step","Cutting inside","Big-game scoring","Set pieces"]},

  {id:"st",  name:"Striker", full:"Sample Striker",    num:9, pos:"Striker",              club:"Club", rating:7.6,
   x:50, y:19, skin:"#5f3a20", hair:"#15100c", style:"waves",
   type:"Penalty-box finisher — movement off the shoulder, clean strike, pressing from the front.",
   known:"Career highlights.",
   strengths:["Movement","Finishing","Channel runs","Pressing"]}
];

/* ===========================================================================
   WIRING — no edits needed below.
   =========================================================================== */
// Header strings
document.getElementById("ctx").textContent = TEAM.context;
document.getElementById("headline").innerHTML =
  `${TEAM.name} <span class="accent">${TEAM.headlineAccent}</span>`;
document.getElementById("sub").innerHTML =
  `<b>${TEAM.formation}</b> · ${TEAM.ratingNote} · tap a player for the scouting card`;
document.getElementById("footer").textContent = TEAM.footer;
document.getElementById("hintCorner").textContent = TEAM.hintCorner;

const pitch = document.getElementById("pitch");
const panelContent = document.getElementById("panelContent");
let activeBtn = null;

PLAYERS.forEach(p=>{
  const btn = document.createElement("button");
  btn.className = "player";
  btn.style.left = p.x + "%";
  btn.style.top = p.y + "%";
  btn.setAttribute("aria-label", `${p.full}, number ${p.num}, ${p.pos}, rated ${p.rating} out of 10`);
  btn.innerHTML = `
    <span class="player-wrap">
      <span class="badge">${p.num}</span>
      <span class="avatar">${avatarSVG(p)}</span>
      <span class="rating">${p.rating.toFixed(1)}</span>
    </span>
    <span class="pname">${p.name}</span>`;
  btn.addEventListener("click", ()=> select(p, btn));
  pitch.appendChild(btn);
});

function select(p, btn){
  if(activeBtn) activeBtn.classList.remove("active");
  btn.classList.add("active");
  activeBtn = btn;
  panelContent.classList.remove("panel-empty");
  panelContent.innerHTML = `
    <div class="ph-row">
      <div class="ph-avatar">${avatarSVG(p)}</div>
      <div>
        <div class="ph-kicker">${p.pos}</div>
        <div class="ph-name">${p.full}<span class="num">#${p.num}</span></div>
        <div class="ph-club">${p.club}</div>
      </div>
    </div>
    <div class="rating-line">
      <div class="rating-big">${p.rating.toFixed(1)}<small> / 10</small></div>
      <div class="rating-bar"><div class="rating-fill" style="width:0%"></div></div>
    </div>
    <div class="sect"><h3>What kind of player</h3><p>${p.type}</p></div>
    <div class="sect"><h3>Known for</h3><p>${p.known}</p></div>
    <div class="sect"><h3>Strengths</h3>
      <div class="chips">${p.strengths.map(s=>`<span class="chip">${s}</span>`).join("")}</div>
    </div>`;
  // double-rAF so the CSS width transition runs from 0
  requestAnimationFrame(()=>{ requestAnimationFrame(()=>{
    panelContent.querySelector(".rating-fill").style.width = (p.rating*10) + "%";
  });});
  if(window.matchMedia("(max-width:760px)").matches){
    document.getElementById("panel").scrollIntoView({behavior:"smooth", block:"nearest"});
  }
}

/* Optional: auto-select the top-rated player on load (uncomment to enable)
   const top = PLAYERS.reduce((a,b)=> b.rating>a.rating ? b : a);
   const topBtn = [...pitch.querySelectorAll('.player')][PLAYERS.indexOf(top)];
   if(topBtn) select(top, topBtn);
*/
</script>
</body>
</html>
